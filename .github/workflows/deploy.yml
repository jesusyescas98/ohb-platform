name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.HOST_PASSWORD }}
          port: 22
          script: |
            cd domains/${{ secrets.DOMAIN_PATH }} || cd public_html
            git pull origin main
            npm install --production
            # Reiniciar el proceso de Node.js en Hostinger
            # Dependiendo de la configuración de Hostinger, esto puede ser automático
            # al detectar cambios en el entry point, o mediante pm2 si está disponible.
            touch .output/server/index.mjs
